<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Taş Bulmacası Çözücü</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4A90E2 0%, #1E3C72 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .alt-baslik {
            font-size: 1.1rem;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        .aciklamalar {
            font-size: 0.9rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .ust-kontroller {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        input[type="text"] {
            background-color: #2b303b;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            width: 120px;
            font-size: 0.9rem;
            text-align: center;
        }

        button, select {
            background-color: #2b303b;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        button:hover, select:hover {
            background-color: #3b4252;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        .tahta-tasiyici {
            background-color: #284462;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .tahta {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(3, 80px);
            gap: 10px;
        }

        .tas {
            background-color: #63D2FF;
            color: white;
            font-size: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.15s ease, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .tas:active {
            transform: scale(0.95);
        }

        .tas.bos {
            background-color: #1e334a;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            cursor: default;
        }

        .oynatma-kontrolleri {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .oynatma-kontrolleri button {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
            background-color: #2b303b;
        }

        .oynatma-kontrolleri button svg {
            width: 20px;
            height: 20px;
            fill: white;
            transition: fill 0.2s;
        }

        .alt-kontroller {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .yontem-etiketi {
            font-size: 0.9rem;
            margin-right: 5px;
        }

        .coz-butonu {
            background-color: #1e2229;
            font-weight: 600;
        }

        .mesaj {
            margin-top: 20px;
            font-weight: bold;
            min-height: 24px;
            color: #a3f7bf;
        }
    </style>
</head>
<body>

    <h1>8 Taş Bulmacası</h1>
    <p class="alt-baslik">Yapay Zeka Destekli Algoritmalarla Çözün</p>
    <p class="aciklamalar">0-8 arası rakamları kullanarak bir başlangıç durumu girin, bir yöntem seçin ve Çöz'e tıklayın.</p>

    <div class="ust-kontroller">
        <label for="baslangicDurumuGirdisi">Başlangıç Durumu:</label>
        <input type="text" id="baslangicDurumuGirdisi" value="208135467" maxlength="9">
        <button onclick="durumuAyarla()">Durumu Ayarla</button>
        <button onclick="rastgeleDurumOlustur()">Rastgele Dağıt</button>
    </div>

    <div class="tahta-tasiyici">
        <div class="tahta" id="oyunTahtasi">
            <!-- Taşlar JavaScript ile oluşturulacak -->
        </div>
    </div>

    <div class="oynatma-kontrolleri">
        <button onclick="oncekiAdim()" title="Önceki Adım">
            <!-- Sol Ok İkonu -->
            <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
        </button>
        <button onclick="cozumuOynat()" title="Oynat">
            <!-- Üçgen Oynat (Play) İkonu -->
            <svg viewBox="0 0 24 24" style="margin-left: 3px;"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button onclick="sonrakiAdim()" title="Sonraki Adım">
            <!-- Sağ Ok İkonu -->
            <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
        </button>
    </div>

    <div class="alt-kontroller">
        <div style="display: flex; align-items: center;">
            <span class="yontem-etiketi">Yöntem:</span>
            <select id="cozumYontemi">
                <option value="uniform">Eşit Maliyetli (Uniform Cost)</option>
                <option value="astar">A* Arama</option>
            </select>
        </div>
        <button class="coz-butonu" onclick="cozmeyeBasla()">Çöz</button>
    </div>

    <div class="mesaj" id="bilgiMesaji"></div>

    <script>
        let mevcutDurum = [2, 0, 8, 1, 3, 5, 4, 6, 7]; // 0 boşluğu temsil eder
        const hedefDurum = [1, 2, 3, 4, 5, 6, 7, 8, 0];
        let baslangicDurumuKopyasi = [];
        
        let cozumYolu = [];
        let guncelAdimIndeksi = 0;
        let animasyonOynuyorMu = false;

        const tahtaElemani = document.getElementById('oyunTahtasi');
        const girdiElemani = document.getElementById('baslangicDurumuGirdisi');
        const mesajElemani = document.getElementById('bilgiMesaji');

        function oyunuBaslat() {
            tahtayiCiz();
        }

        function tahtayiCiz() {
            tahtaElemani.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const tasElemani = document.createElement('div');
                tasElemani.classList.add('tas');
                
                if (mevcutDurum[i] === 0) {
                    tasElemani.classList.add('bos');
                    tasElemani.innerText = '';
                } else {
                    tasElemani.innerText = mevcutDurum[i];
                    tasElemani.onclick = () => tasTasi(i);
                }
                tahtaElemani.appendChild(tasElemani);
            }
            girdiElemani.value = mevcutDurum.join('');
            kazanmaKontroluYapm();
        }

        function tasTasi(tiklananIndeks) {
            const bosKareIndeksi = mevcutDurum.indexOf(0);
            const gecerliHamleler = gecerliHamleleriAl(bosKareIndeksi);

            if (gecerliHamleler.includes(tiklananIndeks)) {
                // Taşların yerini değiştir
                [mevcutDurum[tiklananIndeks], mevcutDurum[bosKareIndeksi]] = [mevcutDurum[bosKareIndeksi], mevcutDurum[tiklananIndeks]];
                cozumYolu = []; // Kullanıcı elle hamle yaparsa otomatik çözümü iptal et
                tahtayiCiz();
            }
        }

        function gecerliHamleleriAl(bosKareIndeksi) {
            const yapilabilecekHamleler = [];
            const satir = Math.floor(bosKareIndeksi / 3);
            const sutun = bosKareIndeksi % 3;

            if (satir > 0) yapilabilecekHamleler.push(bosKareIndeksi - 3); // yukarı
            if (satir < 2) yapilabilecekHamleler.push(bosKareIndeksi + 3); // aşağı
            if (sutun > 0) yapilabilecekHamleler.push(bosKareIndeksi - 1); // sol
            if (sutun < 2) yapilabilecekHamleler.push(bosKareIndeksi + 1); // sağ

            return yapilabilecekHamleler;
        }

        function durumuAyarla() {
            const girilenDeger = girdiElemani.value;
            if (girilenDeger.length === 9 && new Set(girilenDeger.split('')).size === 9 && /^[0-8]+$/.test(girilenDeger)) {
                mevcutDurum = girilenDeger.split('').map(Number);
                cozumYolu = [];
                mesajElemani.innerText = "";
                tahtayiCiz();
            } else {
                alert("Lütfen 0'dan 8'e kadar her rakamın yalnızca 1 kez kullanıldığı 9 haneli bir sayı girin.");
            }
        }

        function rastgeleDurumOlustur() {
            do {
                mevcutDurum = [...hedefDurum].sort(() => Math.random() - 0.5);
            } while (!matematikselOlarakCozulebilirMi(mevcutDurum));
            cozumYolu = [];
            mesajElemani.innerText = "";
            tahtayiCiz();
        }

        function matematikselOlarakCozulebilirMi(dizi) {
            let terslikSayisi = 0;
            for (let i = 0; i < 9 - 1; i++) {
                for (let j = i + 1; j < 9; j++) {
                    if (dizi[i] && dizi[j] && dizi[i] > dizi[j]) {
                        terslikSayisi++;
                    }
                }
            }
            return terslikSayisi % 2 === 0;
        }

        function kazanmaKontroluYapm() {
            if (mevcutDurum.join('') === hedefDurum.join('')) {
                mesajElemani.innerText = "Bulmaca Başarıyla Çözüldü! 🎉";
            }
        }

        //yapay zeka çözücü
        async function cozmeyeBasla() {
            if (mevcutDurum.join('') === hedefDurum.join('')) {
                mesajElemani.innerText = "Tahta zaten çözülmüş durumda!";
                return;
            }

            if(!matematikselOlarakCozulebilirMi(mevcutDurum)) {
                mesajElemani.innerText = "Hata: Bu tahta dizilimi matematik kuralları gereği çözülemez!";
                mesajElemani.style.color = "#ff6b6b";
                return;
            }

            mesajElemani.style.color = "#a3f7bf";
            mesajElemani.innerText = "En kısa yol hesaplanıyor... Lütfen bekleyin.";
            
            setTimeout(() => {
                const bulunanYol = yapayZekaIleCoz(mevcutDurum);
                if (bulunanYol) {
                    baslangicDurumuKopyasi = [...mevcutDurum];
                    cozumYolu = bulunanYol;
                    guncelAdimIndeksi = 0;
                    mesajElemani.innerText = `Çözüm bulundu! Toplam ${bulunanYol.length} adım. İzlemek için Oynat butonuna bas.`;
                } else {
                    mesajElemani.innerText = "Çözüm bulunamadı.";
                }
            }, 100);
        }

        function yapayZekaIleCoz(baslangicDurumu) {
            let aramaKuyrugu = [{ durum: baslangicDurumu, adimGecmisi: [] }];
            let ziyaretEdilenDurumlar = new Set();
            ziyaretEdilenDurumlar.add(baslangicDurumu.join(''));
            const hedefMetin = hedefDurum.join('');

            while (aramaKuyrugu.length > 0) {
                let islenenDugum = aramaKuyrugu.shift();
                
                if (islenenDugum.durum.join('') === hedefMetin) {
                    return islenenDugum.adimGecmisi;
                }

                let bosIndeks = islenenDugum.durum.indexOf(0);
                let ihtimaller = gecerliHamleleriAl(bosIndeks);

                for (let hedefHamle of ihtimaller) {
                    let yeniDurum = [...islenenDugum.durum];
                    [yeniDurum[bosIndeks], yeniDurum[hedefHamle]] = [yeniDurum[hedefHamle], yeniDurum[bosIndeks]];
                    let yeniDurumMetin = yeniDurum.join('');

                    if (!ziyaretEdilenDurumlar.has(yeniDurumMetin)) {
                        ziyaretEdilenDurumlar.add(yeniDurumMetin);
                        aramaKuyrugu.push({ durum: yeniDurum, adimGecmisi: [...islenenDugum.adimGecmisi, yeniDurum] });
                    }
                }
            }
            return null;
        }

        //oynatma kontrolleri
        function sonrakiAdim() {
            if (cozumYolu.length > 0 && guncelAdimIndeksi < cozumYolu.length) {
                mevcutDurum = cozumYolu[guncelAdimIndeksi];
                guncelAdimIndeksi++;
                tahtayiCiz();
            }
        }

        function oncekiAdim() {
            if (cozumYolu.length > 0 && guncelAdimIndeksi > 0) {
                guncelAdimIndeksi--;
                if(guncelAdimIndeksi === 0) {
                    mevcutDurum = [...baslangicDurumuKopyasi];
                } else {
                    mevcutDurum = cozumYolu[guncelAdimIndeksi - 1];
                }
                tahtayiCiz();
            }
        }

        function cozumuOynat() {
            if (cozumYolu.length === 0 || guncelAdimIndeksi >= cozumYolu.length || animasyonOynuyorMu) return;
            animasyonOynuyorMu = true;
            
            const zamanlayici = setInterval(() => {
                if (guncelAdimIndeksi < cozumYolu.length) {
                    mevcutDurum = cozumYolu[guncelAdimIndeksi];
                    tahtayiCiz();
                    guncelAdimIndeksi++;
                } else {
                    clearInterval(zamanlayici);
                    animasyonOynuyorMu = false;
                }
            }, 400); 
        }

        oyunuBaslat();

    </script>
</body>
</html>
